<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Premium | FiveM & GTA RP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        /* CSS CUSTOMIZADO (STYLE.CSS INTEGRADO) */
        [x-cloak] { display: none !important; }
        
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark-bg: #08080a;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-gamer { font-family: 'Orbitron', sans-serif; }

        /* Efeitos de Vidro (Glassmorphism) */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .text-gradient {
            background: linear-gradient(90deg, #6366f1, #00d1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .neon-border {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
        }

        /* Animação de entrada das notificações */
        .notif-enter { transform: translateX(0) !important; }
        
        /* Botão Premium */
        .btn-premium {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: all 0.3s ease;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        /* Scrollbar customizada */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0b; }
        ::-webkit-scrollbar-thumb { background: #1f1f23; border-radius: 10px; }
    </style>
</head>
<body x-data="storeApp()">

    <div id="fake-notif" 
         class="fixed bottom-6 right-6 z-50 glass p-4 rounded-xl border-l-4 border-indigo-500 transition-all duration-700 translate-x-[150%]">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <div>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Atividade Recente</p>
                <p class="text-sm" id="notif-content">Alguém comprou um produto!</p>
            </div>
        </div>
    </div>

    <nav class="sticky top-0 z-40 glass border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div @click="page = 'home'" class="cursor-pointer font-gamer text-xl tracking-tighter text-gradient uppercase">VIRTUAL STORE</div>
            
            <div class="hidden md:flex space-x-8 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400">
                <button @click="page = 'home'" :class="page === 'home' ? 'text-indigo-400' : ''" class="hover:text-white transition">Início</button>
                <button @click="page = 'loja'" :class="page === 'loja' ? 'text-indigo-400' : ''" class="hover:text-white transition">Loja</button>
                <button @click="page = 'perfil'" :class="page === 'perfil' ? 'text-indigo-400' : ''" class="hover:text-white transition">Meus Pedidos</button>
                <button @click="page = 'suporte'" :class="page === 'suporte' ? 'text-indigo-400' : ''" class="hover:text-white transition">Suporte</button>
            </div>

            <a href="https://discord.gg/dSD3cvS5bb" target="_blank" class="bg-[#5865F2] hover:bg-[#4752C4] px-5 py-2 rounded-lg text-xs font-bold transition uppercase">Discord</a>
        </div>
    </nav>

    <template x-if="page === 'home'">
        <main class="pt-20 px-6">
            <div class="max-w-7xl mx-auto text-center">
                <div class="inline-block px-4 py-1 rounded-full border border-indigo-500/30 bg-indigo-500/10 text-indigo-400 text-[10px] font-bold mb-8 tracking-widest uppercase">✨ Entrega Automática via Bot</div>
                <h1 class="text-5xl md:text-8xl font-gamer mb-8 leading-none">EVOLUA SEU <br><span class="text-gradient uppercase">ROLEPLAY.</span></h1>
                <p class="text-gray-400 text-lg max-w-2xl mx-auto mb-12">Adquira vantagens exclusivas, moedas e cargos com total segurança e rapidez.</p>
                <div class="flex flex-col md:flex-row justify-center gap-4">
                    <button @click="page = 'loja'" class="btn-premium px-12 py-5 rounded-2xl font-bold uppercase tracking-widest">Ir para a Loja</button>
                    <a href="https://discord.gg/dSD3cvS5bb" class="glass px-12 py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-white/5 transition">Entrar na Comunidade</a>
                </div>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-32 max-w-4xl mx-auto">
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-2xl font-gamer text-indigo-500">+1.2k</p>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Vendas</p>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-2xl font-gamer text-indigo-500">24/7</p>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Suporte</p>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-2xl font-gamer text-indigo-500">0s</p>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Espera</p>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-2xl font-gamer text-indigo-500">100%</p>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Seguro</p>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <template x-if="page === 'loja'">
        <main class="max-w-7xl mx-auto px-6 py-16">
            <div class="flex flex-col md:flex-row justify-between items-center mb-16 gap-6">
                <h2 class="text-3xl font-gamer uppercase tracking-widest">Catálogo <span class="text-indigo-500">Digital</span></h2>
                <div class="flex gap-2 glass p-1 rounded-xl">
                    <template x-for="cat in ['todos', 'vip', 'coins', 'packs']">
                        <button @click="filter = cat" 
                                :class="filter === cat ? 'bg-indigo-600 text-white shadow-lg' : 'text-gray-500 hover:text-white'"
                                class="px-6 py-2 rounded-lg text-[10px] font-bold uppercase transition" x-text="cat"></button>
                    </template>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <template x-for="item in products">
                    <div x-show="filter === 'todos' || filter === item.category" class="glass p-6 rounded-3xl group hover:border-indigo-500/50 transition duration-500 flex flex-col h-full">
                        <div class="mb-6">
                            <span class="text-indigo-400 text-[9px] font-bold uppercase tracking-[0.2em]" x-text="item.badge"></span>
                            <h3 class="text-xl font-bold mt-2" x-text="item.name"></h3>
                            <p class="text-gray-500 text-xs mt-3 leading-relaxed" x-text="item.desc"></p>
                        </div>
                        <div class="mt-auto">
                            <p class="text-2xl font-bold mb-5" x-text="'R$ ' + item.price.toFixed(2)"></p>
                            <button @click="cart = item; page = 'checkout'" class="w-full btn-premium py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest">Adquirir Agora</button>
                        </div>
                    </div>
                </template>
            </div>
        </main>
    </template>

    <template x-if="page === 'checkout'">
        <main class="max-w-2xl mx-auto px-6 py-20">
            <div class="glass p-10 rounded-[2.5rem] neon-border">
                <h2 class="text-2xl font-gamer text-center mb-10 uppercase">Finalizar Compra</h2>
                
                <div class="bg-white/5 p-6 rounded-2xl mb-8 flex justify-between items-center border border-white/5">
                    <div>
                        <p class="text-[10px] text-gray-500 uppercase font-bold">Produto Selecionado</p>
                        <p class="text-xl font-bold" x-text="cart.name"></p>
                    </div>
                    <p class="text-2xl font-bold text-indigo-400" x-text="'R$ ' + cart.price.toFixed(2)"></p>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-3 ml-1 tracking-widest">ID do Discord (usuario#0000)</label>
                        <input type="text" x-model="discordID" placeholder="Ex: pedro#1234" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500 transition text-white">
                        <p class="text-[9px] text-gray-500 mt-2 px-1 uppercase">Sua recompensa será vinculada a esta conta.</p>
                    </div>

                    <div class="pt-4 space-y-3">
                        <button @click="processPayment" class="w-full btn-premium py-5 rounded-2xl font-bold uppercase tracking-[0.2em]">Pagar com Pix ou Cartão</button>
                        <button @click="page = 'loja'" class="w-full text-gray-500 text-[10px] font-bold uppercase py-2 hover:text-white transition">Voltar para a Loja</button>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <template x-if="page === 'perfil'">
        <main class="max-w-4xl mx-auto px-6 py-20">
            <div class="glass p-10 rounded-[2.5rem]">
                <h2 class="text-2xl font-gamer mb-10 uppercase tracking-widest">Meus <span class="text-indigo-500">Dados</span></h2>
                <div class="grid md:grid-cols-2 gap-6 text-center">
                    <div class="p-8 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-xs text-gray-500 uppercase mb-4 font-bold tracking-widest">Status da Conta</p>
                        <p class="text-sm font-bold text-gray-300">Nenhum VIP ativo no momento.</p>
                    </div>
                    <div class="p-8 bg-white/5 rounded-3xl border border-white/5">
                        <p class="text-xs text-gray-500 uppercase mb-4 font-bold tracking-widest">Pedidos realizados</p>
                        <p class="text-sm font-bold text-gray-300 italic font-light">Histórico vazio.</p>
                    </div>
                </div>
            </div>
        </main>
    </template>

    <template x-if="page === 'suporte'">
        <main class="max-w-4xl mx-auto px-6 py-20 text-center">
            <h2 class="text-5xl font-gamer mb-6 uppercase leading-tight italic">Precisa de <span class="text-indigo-500">Ajuda?</span></h2>
            <p class="text-gray-400 mb-12 max-w-lg mx-auto leading-relaxed">Nossa equipe atende 24 horas por dia através do Discord para garantir que sua experiência seja perfeita.</p>
            
            <a href="https://discord.gg/dSD3cvS5bb" class="inline-flex items-center gap-4 bg-[#5865F2] px-12 py-6 rounded-3xl font-bold text-lg hover:scale-105 transition shadow-2xl">
                ABRIR SUPORTE NO DISCORD
            </a>
        </main>
    </template>

    <footer class="py-20 border-t border-white/5 mt-20">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-center md:text-left">
                <div class="font-gamer text-gradient text-xl mb-2 uppercase">Virtual Store</div>
                <p class="text-gray-600 text-[10px] font-bold tracking-widest uppercase">Não afiliado à Rockstar Games ou Take-Two.</p>
            </div>
            <div class="flex gap-8 text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                <a href="#" class="hover:text-white transition">Termos</a>
                <a href="#" class="hover:text-white transition">Privacidade</a>
                <a href="https://discord.gg/dSD3cvS5bb" class="text-indigo-400 hover:underline">Contato</a>
            </div>
        </div>
    </footer>

    <script>
        function storeApp() {
            return {
                page: 'home',
                filter: 'todos',
                cart: null,
                discordID: '',
                products: [
                    { id: 1, category: 'vip', name: 'VIP DIAMOND', price: 89.90, desc: 'Prioridade máxima, carros exclusivos, tag diamante e salário bônus de 50k.', badge: 'Mais Vendido' },
                    { id: 2, category: 'vip', name: 'VIP PLATINUM', price: 49.90, desc: 'Prioridade média, carros platinum e tag exclusiva no chat.', badge: 'Popular' },
                    { id: 3, category: 'coins', name: 'PACK 1 MILHÃO', price: 60.00, desc: 'Um milhão de moedas limpas no seu banco in-game.', badge: 'Ofertão' },
                    { id: 4, category: 'coins', name: 'PACK 500K', price: 35.00, desc: 'Quinhentas mil moedas limpas no seu banco in-game.', badge: 'Recomendado' },
                    { id: 5, category: 'packs', name: 'STARTER PACK', price: 15.00, desc: 'Mochila G, Kit Reparo, Celular e Rádio integrados.', badge: 'Novo' },
                    { id: 6, category: 'packs', name: 'ARMA PACK', price: 25.00, desc: 'Glock + 5 carregadores e colete pesado.', badge: 'Combate' }
                ],
                processPayment() {
                    if (!this.discordID) {
                        alert("Por favor, digite seu ID do Discord para continuar!");
                        return;
                    }
                    alert("Aguarde... conectando ao gateway de pagamento seguro!");
                    // Aqui você redirecionaria para o link do Checkout Real (Stripe/Pix)
                }
            }
        }

        // Sistema de Notificações Fake de Vendas (Aumenta Conversão)
        function initNotifs() {
            const users = ["Mandrake", "Ghost", "Xandão", "Biel_RP", "Vini7", "Teteu", "Coringa", "Lari_RP", "Dono do Morro"];
            const items = ["VIP Diamond", "VIP Platinum", "Pack 1 Milhão", "Starter Pack"];
            
            const el = document.getElementById('fake-notif');
            const content = document.getElementById('notif-content');
            
            setInterval(() => {
                const u = users[Math.floor(Math.random() * users.length)];
                const i = items[Math.floor(Math.random() * items.length)];
                
                content.innerHTML = `<strong>${u}</strong> acabou de adquirir <strong>${i}</strong>!`;
                
                // Mostrar
                el.classList.remove('translate-x-[150%]');
                
                // Esconder após 5 seg
                setTimeout(() => {
                    el.classList.add('translate-x-[150%]');
                }, 5000);
            }, 20000); // Roda a cada 20 segundos
        }

        window.onload = initNotifs;
    </script>
</body>
</html>
